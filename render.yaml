services:
  - type: web
    name: our-place-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: our-place-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist